name: sonar

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 0 * * *"

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: 3.8

      - name: Run tests
        run: uv run task test

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}