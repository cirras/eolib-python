name: lint

on:
  push:
    branches: master
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true

    - name: Setup uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: 3.8

    - name: Lint typing and code style
      run: uv run task format:check && uv run task typing
